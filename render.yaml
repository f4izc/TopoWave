# Render Blueprint - TopoWave
# Deploy with: https://render.com/deploy

services:
  # Backend - FastAPI
  - type: web
    name: topowave-api
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: CORS_ORIGINS
        value: https://topowave.onrender.com,http://localhost:3000
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /api/
    autoDeploy: true

  # Frontend - React Static Site
  - type: web
    name: topowave
    runtime: static
    region: frankfurt
    plan: free
    buildCommand: yarn install && yarn build
    staticPublishPath: build
    rootDir: frontend
    envVars:
      - key: REACT_APP_BACKEND_URL
        value: https://topowave-api.onrender.com
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /index.html
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    autoDeploy: true
